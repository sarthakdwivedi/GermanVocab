<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>German Vocab Builder</title><link rel="stylesheet" href="assets/style.css"></head><body><header><div class="topbar"><div class="brand">German Vocab Builder</div><nav class="nav"><a class="active" href="index.html">All Words</a><a href="rules.html">Rules</a><a href="test.html">Test Mode</a></nav></div></header><main><section class="hero"><h1 style="margin-top:0">Combined default view</h1><p>All themes are shown together by default. Filter by level, theme, revision status, and exceptions.</p></section><section class="controls"><div class="control"><label>Search</label><input id="searchInput" placeholder="Search German, English, plural"></div><div class="control"><label>Level</label><select id="levelFilter"><option value="">All levels</option><option value="A1">A1</option><option value="A2">A2</option><option value="B1">B1</option></select></div><div class="control"><label>Theme</label><select id="themeFilter"><option value="">All themes</option></select></div><div class="control"><label>Status</label><select id="statusFilter"><option value="">All statuses</option><option value="revision">Marked for revision</option><option value="due">Due today / overdue</option><option value="mastered">Mastered</option><option value="new">New</option></select></div><div class="control"><label>Exceptions only</label><input id="exceptionOnly" type="checkbox"></div></section><div class="stats"><div class="stat" id="resultsCount">0 words</div><div class="stat"><a href="test.html">Open test mode</a></div></div><section id="cards" class="grid"></section><p class="small">Progress is saved in your browser with localStorage.</p></main><script src="assets/app.js"></script><script src="assets/index.js"></script></body></html>
